<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>// AGENT RESEARCH HUB</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f;
    --bg2: #0f1117;
    --bg3: #141720;
    --panel: #12141a;
    --border: #1e2130;
    --border2: #252a3a;
    --text: #c8cdd8;
    --text2: #6b7280;
    --text3: #9ca3af;
    --scout: #4fc3f7;
    --analyst: #69f0ae;
    --diver: #ce93d8;
    --critic: #ff7043;
    --memory: #ffd54f;
    --synth: #f48fb1;
    --accent: #4fc3f7;
    --glow: rgba(79,195,247,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    padding: 0 20px;
    height: 48px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 32px;
    z-index: 100;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--text2);
    white-space: nowrap;
  }
  .logo span { color: var(--text); }

  .stats {
    display: flex;
    gap: 32px;
    flex: 1;
    justify-content: center;
  }
  .stat { text-align: center; line-height: 1; }
  .stat-val { font-size: 18px; font-weight: 700; color: var(--scout); letter-spacing: 0.05em; }
  .stat-val.topics  { color: var(--analyst); }
  .stat-val.active  { color: var(--synth); }
  .stat-val.clock   { color: var(--text3); font-size: 14px; }
  .stat-label { font-size: 9px; letter-spacing: 0.2em; color: var(--text2); margin-top: 3px; text-transform: uppercase; }

  .topbar-right { display: flex; align-items: center; gap: 10px; }

  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4ade80; box-shadow: 0 0 6px #4ade80;
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    padding: 5px 12px;
    border: 1px solid var(--border2);
    background: var(--bg3); color: var(--text3);
    cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,195,247,0.05); }
  .btn.primary { border-color: var(--scout); color: var(--scout); background: rgba(79,195,247,0.08); }
  .btn.primary:hover { background: rgba(79,195,247,0.15); }

  /* ── MAIN ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── GRAPH ── */
  .graph-area { flex: 1; position: relative; overflow: hidden; }
  #graph-svg { width: 100%; height: 100%; }

  .filterbar {
    position: absolute; bottom: 16px; left: 16px;
    display: flex; gap: 6px; align-items: center;
  }
  .filter-label { font-size: 9px; color: var(--text2); letter-spacing: 0.15em; text-transform: uppercase; }
  .filter-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    padding: 3px 10px; border: 1px solid var(--border2);
    background: transparent; color: var(--text2); cursor: pointer; letter-spacing: 0.1em; transition: all 0.15s;
  }
  .filter-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); border-color: var(--text2); }
  .filter-btn.active { background: rgba(255,255,255,0.04); color: var(--text); border-color: var(--text2); }
  .filter-btn[data-agent="Scout"].active   { border-color: var(--scout);   color: var(--scout); }
  .filter-btn[data-agent="Analyst"].active { border-color: var(--analyst); color: var(--analyst); }
  .filter-btn[data-agent="Diver"].active   { border-color: var(--diver);   color: var(--diver); }
  .filter-btn[data-agent="Critic"].active  { border-color: var(--critic);  color: var(--critic); }
  .filter-btn[data-agent="Memory"].active  { border-color: var(--memory);  color: var(--memory); }
  .filter-btn[data-agent="Synth"].active   { border-color: var(--synth);   color: var(--synth); }

  .hint {
    position: absolute; bottom: 16px; right: 316px;
    font-size: 10px; color: var(--text2); letter-spacing: 0.1em; pointer-events: none;
  }

  /* ── PROGRESS OVERLAY ── */
  .progress-overlay {
    position: absolute; inset: 0;
    background: rgba(10,11,15,0.88);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px; z-index: 50;
  }
  .progress-overlay.visible { display: flex; }

  .progress-title {
    font-size: 11px; color: var(--text3); letter-spacing: 0.2em; text-transform: uppercase;
  }

  .agent-progress-list { display: flex; flex-direction: column; gap: 8px; width: 320px; }

  .ap-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    background: var(--bg3);
    transition: border-color 0.3s;
  }
  .ap-row.running { border-color: var(--border2); }
  .ap-row.done    { opacity: 0.5; }

  .ap-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .ap-name { font-size: 10px; flex: 1; letter-spacing: 0.08em; }
  .ap-status {
    font-size: 9px; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase;
  }
  .ap-row.running .ap-status { color: var(--scout); animation: blink 1s infinite; }
  .ap-row.done    .ap-status { color: var(--analyst); }

  /* ── RIGHT PANEL ── */
  .panel {
    width: 300px; background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }

  .panel-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .tab {
    flex: 1; padding: 12px 8px; font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; text-align: center; cursor: pointer;
    color: var(--text2); border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--scout); }
  .tab:hover { color: var(--text3); }

  .tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .tab-content.active { display: flex; }

  /* AGENTS TAB */
  .agent-list { overflow-y: auto; padding: 8px; flex: 1; }
  .agent-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border: 1px solid var(--border);
    margin-bottom: 6px; background: var(--bg3); transition: all 0.15s;
  }
  .agent-item:hover { border-color: var(--border2); background: rgba(255,255,255,0.02); }
  .agent-icon {
    width: 32px; height: 32px; border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
  }
  .agent-info { flex: 1; min-width: 0; }
  .agent-name { font-size: 12px; font-weight: 700; }
  .agent-sub { font-size: 9px; color: var(--text2); margin-top: 2px; letter-spacing: 0.05em; }
  .agent-badge {
    font-size: 8px; padding: 2px 6px; letter-spacing: 0.1em; border: 1px solid currentColor; opacity: 0.8;
  }

  /* INPUT AREA */
  .input-area {
    padding: 12px; border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .input-label { font-size: 9px; color: var(--text2); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
  .topic-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 11px;
    padding: 8px 10px; outline: none; margin-bottom: 8px; transition: border-color 0.2s;
  }
  .topic-input:focus { border-color: var(--scout); }
  .topic-input::placeholder { color: var(--text2); }

  .agent-select-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .agent-toggle {
    font-family: 'JetBrains Mono', monospace; font-size: 8px;
    padding: 3px 7px; border: 1px solid var(--border2);
    background: transparent; color: var(--text2); cursor: pointer; letter-spacing: 0.08em; transition: all 0.15s;
  }
  .agent-toggle.selected { background: rgba(255,255,255,0.04); }

  .run-btn {
    width: 100%; padding: 10px;
    background: rgba(79,195,247,0.08); border: 1px solid var(--scout);
    color: var(--scout); font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .run-btn:hover { background: rgba(79,195,247,0.15); }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ACTIVITY TAB */
  .activity-list { overflow-y: auto; padding: 8px; flex: 1; }
  .activity-item {
    padding: 8px 10px; border-left: 2px solid var(--border2);
    margin-bottom: 6px; font-size: 10px;
  }
  .act-agent { font-size: 9px; margin-bottom: 2px; font-weight: 700; }
  .act-text { color: var(--text3); line-height: 1.4; }
  .act-time { font-size: 8px; color: var(--text2); margin-top: 3px; }

  /* INSIGHTS TAB */
  .insights-content { overflow-y: auto; padding: 12px; flex: 1; }
  .insight-card {
    background: var(--bg3); border: 1px solid var(--border);
    padding: 12px; margin-bottom: 8px;
  }
  .insight-title { font-size: 10px; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.1em; text-transform: uppercase; }
  .insight-val { font-size: 20px; font-weight: 700; color: var(--scout); }
  .insight-sub { font-size: 9px; color: var(--text2); margin-top: 4px; }
  .topic-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .topic-tag { font-size: 8px; padding: 2px 8px; border: 1px solid var(--border2); color: var(--text3); letter-spacing: 0.08em; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px); z-index: 1000;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--panel); border: 1px solid var(--border2);
    width: 100%; max-width: 680px; max-height: 85vh;
    display: flex; flex-direction: column;
    box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 30px var(--glow);
    animation: modalIn 0.2s ease-out;
  }
  @keyframes modalIn { from{transform:scale(0.97);opacity:0} to{transform:scale(1);opacity:1} }

  .modal-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .modal-agent-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .modal-title { flex: 1; }
  .modal-agent-name { font-size: 13px; font-weight: 700; }
  .modal-topic { font-size: 10px; color: var(--text2); margin-top: 2px; letter-spacing: 0.05em; }
  .modal-close { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 4px; font-family: monospace; }
  .modal-close:hover { color: var(--text); }

  .modal-body { overflow-y: auto; padding: 20px; flex: 1; }

  .modal-summary {
    font-size: 12px; line-height: 1.7; color: var(--text3);
    padding: 12px 16px; border-left: 2px solid var(--accent);
    background: rgba(79,195,247,0.04); margin-bottom: 20px;
  }

  .section-title {
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text2); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border);
  }

  .finding-list { list-style: none; margin-bottom: 20px; }
  .finding-list li {
    font-size: 11px; line-height: 1.6; color: var(--text);
    padding: 6px 0 6px 16px; border-bottom: 1px solid var(--border); position: relative;
  }
  .finding-list li::before { content: '→'; position: absolute; left: 0; color: var(--accent); opacity: 0.6; }

  .tags-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 16px; }
  .tag { font-size: 9px; padding: 2px 8px; border: 1px solid var(--border2); color: var(--text3); letter-spacing: 0.08em; }

  .sources-list { list-style: none; }
  .sources-list li { margin-bottom: 4px; }
  .sources-list a { font-size: 10px; color: var(--accent); text-decoration: none; opacity: 0.7; transition: opacity 0.15s; }
  .sources-list a:hover { opacity: 1; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }

  .modal-footer {
    padding: 12px 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .modal-time { font-size: 9px; color: var(--text2); }
  .confidence-badge { font-size: 9px; padding: 3px 10px; letter-spacing: 0.1em; border: 1px solid; }
  .confidence-badge.high   { border-color: var(--analyst); color: var(--analyst); }
  .confidence-badge.medium { border-color: var(--memory);  color: var(--memory); }
  .confidence-badge.low    { border-color: var(--critic);  color: var(--critic); }

  /* D3 */
  .node-group { cursor: pointer; }
  .node-label { fill: rgba(200,205,216,0.7); font-family:'JetBrains Mono',monospace; font-size:9px; text-anchor:middle; pointer-events:none; }
  .node-agent-label { fill: rgba(200,205,216,0.35); font-family:'JetBrains Mono',monospace; font-size:8px; text-anchor:middle; pointer-events:none; }
  .link-line { stroke: rgba(255,255,255,0.07); stroke-width:1; fill:none; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">// <span>AGENT</span> RESEARCH HUB</div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="stat-results">0</div><div class="stat-label">Results</div></div>
    <div class="stat"><div class="stat-val active" id="stat-active">0</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-val topics" id="stat-topics">0</div><div class="stat-label">Topics</div></div>
    <div class="stat"><div class="stat-val clock" id="stat-clock">00:00:00</div><div class="stat-label">Clock</div></div>
  </div>
  <div class="topbar-right">
    <div class="live-dot"></div>
    <span style="font-size:10px;color:var(--text2);letter-spacing:0.1em">LIVE</span>
    <button class="btn" onclick="exportData()">↓ EXPORT</button>
    <button class="btn primary" onclick="focusInput()">+ NEW RESEARCH</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- GRAPH -->
  <div class="graph-area">
    <svg id="graph-svg"></svg>

    <!-- PER-AGENT PROGRESS -->
    <div class="progress-overlay" id="progress-overlay">
      <div class="progress-title" id="progress-title">RUNNING AGENTS</div>
      <div class="agent-progress-list" id="agent-progress-list"></div>
    </div>

    <div class="filterbar">
      <span class="filter-label">FILTER</span>
      <button class="filter-btn active" data-agent="All"     onclick="setFilter('All',this)">All</button>
      <button class="filter-btn" data-agent="Scout"   onclick="setFilter('Scout',this)">Scout</button>
      <button class="filter-btn" data-agent="Analyst" onclick="setFilter('Analyst',this)">Analyst</button>
      <button class="filter-btn" data-agent="Diver"   onclick="setFilter('Diver',this)">Diver</button>
      <button class="filter-btn" data-agent="Critic"  onclick="setFilter('Critic',this)">Critic</button>
      <button class="filter-btn" data-agent="Memory"  onclick="setFilter('Memory',this)">Memory</button>
      <button class="filter-btn" data-agent="Synth"   onclick="setFilter('Synth',this)">Synth</button>
    </div>

    <div class="hint">click any bubble to read the research</div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel">
    <div class="panel-tabs">
      <div class="tab active" onclick="switchTab('agents',this)">AGENTS</div>
      <div class="tab" onclick="switchTab('activity',this)">ACTIVITY</div>
      <div class="tab" onclick="switchTab('insights',this)">INSIGHTS</div>
    </div>

    <!-- AGENTS -->
    <div class="tab-content active" id="tab-agents">
      <div class="agent-list" id="agent-list"></div>
      <div class="input-area">
        <div class="input-label">Research Topic</div>
        <input type="text" class="topic-input" id="topic-input"
          placeholder="e.g. fitness apps, fintech..."
          onkeydown="if(event.key==='Enter') runResearch()">
        <div style="font-size:9px;color:var(--text2);margin-bottom:6px;letter-spacing:0.08em">Select agents:</div>
        <div class="agent-select-row" id="agent-toggles"></div>
        <button class="run-btn" id="run-btn" onclick="runResearch()">▶ RUN RESEARCH</button>
      </div>
    </div>

    <!-- ACTIVITY -->
    <div class="tab-content" id="tab-activity">
      <div class="activity-list" id="activity-list">
        <div style="padding:20px;text-align:center;color:var(--text2);font-size:10px">No activity yet</div>
      </div>
    </div>

    <!-- INSIGHTS -->
    <div class="tab-content" id="tab-insights">
      <div class="insights-content" id="insights-content">
        <div style="padding:20px;text-align:center;color:var(--text2);font-size:10px">Run research to see insights</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-agent-dot" id="modal-dot"></div>
      <div class="modal-title">
        <div class="modal-agent-name" id="modal-agent"></div>
        <div class="modal-topic" id="modal-topic"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <div class="modal-time" id="modal-time"></div>
      <div class="confidence-badge" id="modal-confidence"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const AGENT_COLORS = {
  Scout:'#4fc3f7', Analyst:'#69f0ae', Diver:'#ce93d8',
  Critic:'#ff7043', Memory:'#ffd54f', Synth:'#f48fb1'
};
const AGENT_ICONS = {
  Scout:'🔵', Analyst:'📈', Diver:'🔮', Critic:'⚡', Memory:'🧠', Synth:'✨'
};
const AGENT_DESC = {
  Scout:'Finds real user complaints', Analyst:'Spots market patterns',
  Diver:'Deep dives a single topic', Critic:'Challenges assumptions',
  Memory:'Indexes & connects findings', Synth:'Generates app ideas'
};

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let allNodes = [];
let activeFilter = 'All';
let selectedAgents = new Set(Object.keys(AGENT_COLORS));
let simulation = null;
let isRunning = false;
let startTime = Date.now();
// stable positions so graph doesn't jump on update
let nodePositions = {};

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
async function init() {
  renderAgentList();
  renderAgentToggles();
  startClock();
  await loadFromServer();
  renderGraph();
}

function startClock() {
  setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const h = String(Math.floor(s/3600)).padStart(2,'0');
    const m = String(Math.floor((s%3600)/60)).padStart(2,'0');
    const sec = String(s%60).padStart(2,'0');
    document.getElementById('stat-clock').textContent = `${h}:${m}:${sec}`;
  }, 1000);
}

async function loadFromServer() {
  try {
    const res = await fetch('/api/store');
    const data = await res.json();
    if (data.results) {
      allNodes = data.results;
      updateStats();
      // rebuild activity from stored nodes
      allNodes.slice().reverse().slice(0, 20).forEach(n => addActivityItem(n, false));
    }
  } catch(e) {
    console.warn('Could not load from server:', e);
  }
}

function updateStats() {
  document.getElementById('stat-results').textContent = allNodes.length;
  const topics = new Set(allNodes.map(n => n.topic)).size;
  document.getElementById('stat-topics').textContent = topics;
  updateInsights();
  renderAgentList();
}

// ═══════════════════════════════════════════════
// AGENT LIST & TOGGLES
// ═══════════════════════════════════════════════
function renderAgentList() {
  const el = document.getElementById('agent-list');
  el.innerHTML = Object.entries(AGENT_COLORS).map(([name, color]) => {
    const count = allNodes.filter(n => n.agent === name).length;
    return `
    <div class="agent-item" style="border-left:2px solid ${color}20">
      <div class="agent-icon" style="color:${color};border-color:${color}40">${AGENT_ICONS[name]}</div>
      <div class="agent-info">
        <div class="agent-name" style="color:${color}">${name}</div>
        <div class="agent-sub">${AGENT_DESC[name]}</div>
      </div>
      <div class="agent-badge" style="color:${color};border-color:${color}60">
        ${count > 0 ? count + ' NODE' + (count > 1 ? 'S' : '') : 'READY'}
      </div>
    </div>`;
  }).join('');
}

function renderAgentToggles() {
  const el = document.getElementById('agent-toggles');
  el.innerHTML = Object.entries(AGENT_COLORS).map(([name, color]) => `
    <button class="agent-toggle selected" data-a="${name}"
      style="border-color:${color}60;color:${color}"
      onclick="toggleAgent('${name}',this)">${name}</button>
  `).join('');
}

function toggleAgent(name, btn) {
  const color = AGENT_COLORS[name];
  if (selectedAgents.has(name)) {
    selectedAgents.delete(name);
    btn.classList.remove('selected');
    btn.style.borderColor = 'var(--border2)';
    btn.style.color = 'var(--text2)';
  } else {
    selectedAgents.add(name);
    btn.classList.add('selected');
    btn.style.borderColor = color + '80';
    btn.style.color = color;
  }
}

// ═══════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ═══════════════════════════════════════════════
// RESEARCH — with per-agent progress
// ═══════════════════════════════════════════════
function focusInput() {
  document.getElementById('topic-input').focus();
  switchTab('agents', document.querySelector('.tab'));
}

async function runResearch() {
  const topic = document.getElementById('topic-input').value.trim();
  if (!topic) { document.getElementById('topic-input').focus(); return; }
  if (isRunning) return;

  const agents = [...selectedAgents];
  if (agents.length === 0) { alert('Select at least one agent'); return; }

  isRunning = true;
  document.getElementById('run-btn').disabled = true;
  document.getElementById('stat-active').textContent = agents.length;

  // Build per-agent progress UI
  const overlay = document.getElementById('progress-overlay');
  const progressTitle = document.getElementById('progress-title');
  const progressList = document.getElementById('agent-progress-list');

  progressTitle.textContent = `RUNNING ${agents.length} AGENT${agents.length > 1 ? 'S' : ''} ON "${topic.toUpperCase()}"`;

  progressList.innerHTML = agents.map(a => `
    <div class="ap-row" id="ap-${a}">
      <div class="ap-dot" style="background:${AGENT_COLORS[a]}"></div>
      <div class="ap-name" style="color:${AGENT_COLORS[a]}">${a}</div>
      <div class="ap-status" id="aps-${a}">WAITING</div>
    </div>
  `).join('');

  overlay.classList.add('visible');

  // Run agents one by one via single endpoint so we can show progress
  const newResults = [];
  for (const agentName of agents) {
    // mark running
    document.getElementById(`ap-${agentName}`)?.classList.add('running');
    document.getElementById(`aps-${agentName}`).textContent = 'RUNNING...';

    try {
      const res = await fetch('/api/research/single', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic, agent: agentName })
      });
      if (res.ok) {
        const node = await res.json();
        allNodes.push(node);
        newResults.push(node);
        addActivityItem(node, true);

        // mark done
        document.getElementById(`ap-${agentName}`)?.classList.remove('running');
        document.getElementById(`ap-${agentName}`)?.classList.add('done');
        document.getElementById(`aps-${agentName}`).textContent = '✓ DONE';

        // update graph live as each result comes in
        renderGraph(true);
      } else {
        document.getElementById(`aps-${agentName}`).textContent = '✗ ERROR';
      }
    } catch(e) {
      document.getElementById(`aps-${agentName}`).textContent = '✗ FAILED';
    }

    document.getElementById('stat-active').textContent =
      agents.length - (agents.indexOf(agentName) + 1);
  }

  updateStats();

  // hide overlay after short delay
  setTimeout(() => {
    overlay.classList.remove('visible');
    isRunning = false;
    document.getElementById('run-btn').disabled = false;
    document.getElementById('stat-active').textContent = 0;
    document.getElementById('topic-input').value = '';
  }, 1200);
}

// ═══════════════════════════════════════════════
// ACTIVITY
// ═══════════════════════════════════════════════
function addActivityItem(node, prepend = true) {
  const list = document.getElementById('activity-list');
  const placeholder = list.querySelector('div[style]');
  if (placeholder) list.innerHTML = '';

  const color = node.color || AGENT_COLORS[node.agent] || '#888';
  const item = document.createElement('div');
  item.className = 'activity-item';
  item.style.borderLeftColor = color;
  item.innerHTML = `
    <div class="act-agent" style="color:${color}">${node.agent}</div>
    <div class="act-text">${(node.summary || 'Research completed').substring(0, 100)}...</div>
    <div class="act-time">${new Date(node.timestamp).toLocaleTimeString()} · ${node.topic}</div>
  `;
  if (prepend) {
    list.insertBefore(item, list.firstChild);
  } else {
    list.appendChild(item);
  }
}

// ═══════════════════════════════════════════════
// INSIGHTS
// ═══════════════════════════════════════════════
function updateInsights() {
  const el = document.getElementById('insights-content');
  if (allNodes.length === 0) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2);font-size:10px">Run research to see insights</div>';
    return;
  }

  const topics = [...new Set(allNodes.map(n => n.topic))];
  const agentCounts = {};
  allNodes.forEach(n => { agentCounts[n.agent] = (agentCounts[n.agent] || 0) + 1; });
  const topAgent = Object.entries(agentCounts).sort((a,b) => b[1]-a[1])[0];
  const allTags = allNodes.flatMap(n => n.tags || []);
  const tagCounts = {};
  allTags.forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; });
  const topTags = Object.entries(tagCounts).sort((a,b) => b[1]-a[1]).slice(0, 10);

  el.innerHTML = `
    <div class="insight-card">
      <div class="insight-title">Total Research Nodes</div>
      <div class="insight-val">${allNodes.length}</div>
      <div class="insight-sub">Across ${topics.length} topic${topics.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="insight-card">
      <div class="insight-title">Most Active Agent</div>
      <div class="insight-val" style="color:${AGENT_COLORS[topAgent[0]] || '#fff'}">${topAgent[0]}</div>
      <div class="insight-sub">${topAgent[1]} node${topAgent[1] !== 1 ? 's' : ''} generated</div>
    </div>
    <div class="insight-card">
      <div class="insight-title">Topics Researched</div>
      <div class="topic-tags">${topics.map(t => `<div class="topic-tag">${t}</div>`).join('')}</div>
    </div>
    ${topTags.length > 0 ? `
    <div class="insight-card">
      <div class="insight-title">Top Tags</div>
      <div class="topic-tags">${topTags.map(([t,c]) => `<div class="topic-tag">${t} (${c})</div>`).join('')}</div>
    </div>` : ''}
    <button class="btn" style="width:100%;margin-top:8px;color:#ff7043;border-color:#ff704340" onclick="clearAllData()">
      ✕ CLEAR ALL DATA
    </button>
  `;
}

async function clearAllData() {
  if (!confirm('Clear all research data? This cannot be undone.')) return;
  await fetch('/api/store', { method: 'DELETE' });
  allNodes = [];
  nodePositions = {};
  updateStats();
  renderGraph();
  document.getElementById('activity-list').innerHTML =
    '<div style="padding:20px;text-align:center;color:var(--text2);font-size:10px">No activity yet</div>';
}

// ═══════════════════════════════════════════════
// D3 FORCE GRAPH — stable positions
// ═══════════════════════════════════════════════
function getFilteredNodes() {
  return activeFilter === 'All' ? allNodes : allNodes.filter(n => n.agent === activeFilter);
}

function setFilter(agent, btn) {
  activeFilter = agent;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGraph();
}

function renderGraph(keepPositions = false) {
  const svg = d3.select('#graph-svg');
  const W = svg.node().clientWidth  || window.innerWidth - 300;
  const H = svg.node().clientHeight || window.innerHeight - 48;

  const filtered = getFilteredNodes();

  // Save current positions before clearing
  if (simulation) {
    simulation.nodes().forEach(d => {
      nodePositions[d.id] = { x: d.x, y: d.y };
    });
    simulation.stop();
  }

  svg.selectAll('*').remove();

  const defs = svg.append('defs');
  ['glow','glow-strong'].forEach((id, i) => {
    const f = defs.append('filter').attr('id', id);
    f.append('feGaussianBlur').attr('stdDeviation', i === 0 ? 4 : 8).attr('result', 'coloredBlur');
    const fm = f.append('feMerge');
    fm.append('feMergeNode').attr('in', 'coloredBlur');
    fm.append('feMergeNode').attr('in', 'SourceGraphic');
  });

  if (filtered.length === 0) {
    svg.append('text')
      .attr('x', W/2).attr('y', H/2)
      .attr('text-anchor','middle').attr('fill','#333')
      .attr('font-family','JetBrains Mono,monospace').attr('font-size','12px')
      .text('No research nodes yet — run your first query →');
    return;
  }

  const nodes = filtered.map((d, i) => {
    const saved = nodePositions[d.id];
    return {
      ...d,
      id: d.id || `node_${i}`,
      x: saved ? saved.x : W/2 + (Math.random()-0.5)*W*0.5,
      y: saved ? saved.y : H/2 + (Math.random()-0.5)*H*0.5,
      r: 14 + Math.min((d.key_findings || []).length * 2, 14)
    };
  });

  const links = [];
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      if (nodes[i].topic === nodes[j].topic) {
        links.push({ source: nodes[i].id, target: nodes[j].id });
      }
    }
  }

  const container = svg.append('g');

  const zoom = d3.zoom().scaleExtent([0.2, 4])
    .on('zoom', e => container.attr('transform', e.transform));
  svg.call(zoom);

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(130).strength(0.25))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(W/2, H/2).strength(keepPositions ? 0.02 : 0.1))
    .force('collision', d3.forceCollide(d => d.r + 22));

  // If we have saved positions, reduce initial alpha so nodes don't jump
  if (keepPositions && Object.keys(nodePositions).length > 0) {
    simulation.alpha(0.15).alphaDecay(0.05);
  }

  const linkEl = container.append('g')
    .selectAll('line').data(links).join('line').attr('class','link-line');

  const nodeEl = container.append('g')
    .selectAll('g').data(nodes).join('g').attr('class','node-group')
    .call(d3.drag()
      .on('start', (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on('click', (e,d) => openModal(d));

  // outer ambient glow
  nodeEl.append('circle')
    .attr('r', d => d.r+14)
    .attr('fill', d => d.color || AGENT_COLORS[d.agent] || '#4fc3f7')
    .attr('opacity', 0.07)
    .attr('filter','url(#glow)');

  // pulse ring
  nodeEl.append('circle')
    .attr('r', d => d.r+6)
    .attr('fill','none')
    .attr('stroke', d => d.color || AGENT_COLORS[d.agent] || '#4fc3f7')
    .attr('stroke-width', 0.5).attr('opacity', 0.25);

  // main circle
  nodeEl.append('circle')
    .attr('class','node-circle')
    .attr('r', d => d.r)
    .attr('fill', d => (d.color || AGENT_COLORS[d.agent] || '#4fc3f7') + '20')
    .attr('stroke', d => d.color || AGENT_COLORS[d.agent] || '#4fc3f7')
    .attr('stroke-opacity', 0.85)
    .attr('filter','url(#glow)');

  // topic label
  nodeEl.append('text').attr('class','node-label')
    .attr('dy','0.35em').attr('y',-5)
    .text(d => d.topic.length > 13 ? d.topic.substring(0,11)+'..' : d.topic);

  // agent label
  nodeEl.append('text').attr('class','node-agent-label')
    .attr('dy','0.35em').attr('y', 8)
    .attr('fill', d => (d.color || AGENT_COLORS[d.agent] || '#888') + '77')
    .text(d => d.agent);

  nodeEl
    .on('mouseenter', function(e,d) {
      d3.select(this).select('.node-circle')
        .attr('fill', (d.color || AGENT_COLORS[d.agent] || '#4fc3f7') + '44')
        .attr('filter','url(#glow-strong)');
    })
    .on('mouseleave', function(e,d) {
      d3.select(this).select('.node-circle')
        .attr('fill', (d.color || AGENT_COLORS[d.agent] || '#4fc3f7') + '20')
        .attr('filter','url(#glow)');
    });

  simulation.on('tick', () => {
    linkEl
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeEl.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

// ═══════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════
function openModal(node) {
  const color = node.color || AGENT_COLORS[node.agent] || '#888';
  const dot = document.getElementById('modal-dot');
  dot.style.background = color;
  dot.style.boxShadow = `0 0 8px ${color}`;
  document.getElementById('modal-agent').textContent = node.agent;
  document.getElementById('modal-agent').style.color = color;
  document.getElementById('modal-topic').textContent = `Research: "${node.topic}"`;

  const conf = (node.confidence || 'medium').toLowerCase();
  const confEl = document.getElementById('modal-confidence');
  confEl.textContent = `CONFIDENCE: ${conf.toUpperCase()}`;
  confEl.className = `confidence-badge ${conf}`;
  document.getElementById('modal-time').textContent =
    node.timestamp ? new Date(node.timestamp).toLocaleString() : '';

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-summary">${node.summary || 'No summary available.'}</div>

    ${(node.key_findings||[]).length ? `
      <div class="section-title">Key Findings</div>
      <ul class="finding-list">
        ${node.key_findings.map(f=>`<li>${f}</li>`).join('')}
      </ul>` : ''}

    <div class="two-col">
      ${(node.pain_points||[]).length ? `
        <div>
          <div class="section-title">Pain Points</div>
          <ul class="finding-list">${node.pain_points.map(p=>`<li style="font-size:10px">${p}</li>`).join('')}</ul>
        </div>` : ''}
      ${(node.opportunities||[]).length ? `
        <div>
          <div class="section-title">Opportunities</div>
          <ul class="finding-list">${node.opportunities.map(o=>`<li style="font-size:10px">${o}</li>`).join('')}</ul>
        </div>` : ''}
    </div>

    ${(node.specific_apps||[]).length ? `
      <div class="section-title">Apps Mentioned</div>
      <div class="tags-row" style="margin-bottom:20px">
        ${node.specific_apps.map(a=>`<div class="tag" style="border-color:${color}40;color:${color}cc">${a}</div>`).join('')}
      </div>` : ''}

    ${(node.tags||[]).length ? `
      <div class="section-title">Tags</div>
      <div class="tags-row" style="margin-bottom:20px">
        ${node.tags.map(t=>`<div class="tag">${t}</div>`).join('')}
      </div>` : ''}

    ${(node.sources||[]).length ? `
      <div class="section-title">Sources</div>
      <ul class="sources-list">
        ${node.sources.map(s=>`<li><a href="${s.url}" target="_blank" rel="noopener">↗ ${s.title||s.url}</a></li>`).join('')}
      </ul>` : ''}
  `;

  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ═══════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════
function exportData() {
  const blob = new Blob([JSON.stringify(allNodes, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `research_export_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// RESIZE
// ═══════════════════════════════════════════════
window.addEventListener('resize', () => renderGraph(true));

// GO
// ═══════════════════════════════════════════════
init();
</script>
